<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 600点対策 - 単語・文法学習サイト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
        }

        .quiz-container {
            display: none;
        }

        .quiz-container.active {
            display: block;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }

        .question-number {
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
            padding: 20px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 1em;
            text-align: left;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
            font-weight: 600;
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }

        .feedback {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .explanation {
            padding: 15px 20px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            color: #856404;
        }

        .explanation.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .results-score {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            margin: 30px 0;
        }

        .results-message {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
        }

        .results-details {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .results-details p {
            font-size: 1.1em;
            color: #666;
            margin: 10px 0;
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .mode-info {
            background: #e3f2fd;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .results-score {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 TOEIC 600点対策</h1>
            <p>単語・文法を効率的に学習しよう</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="selectMode('vocabulary')">
                📖 単語問題
            </button>
            <button class="mode-btn" onclick="selectMode('grammar')">
                ✏️ 文法・語彙問題
            </button>
        </div>

        <!-- 単語問題 -->
        <div id="vocabulary" class="quiz-container active">
            <div class="mode-info">
                💡 単語の意味を選択してください。4択から正しい答えを選びましょう。
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="vocab-progress">0%</div>
            </div>
            <div class="question-number" id="vocab-question-num">問題 1/10</div>
            <div class="question-text" id="vocab-question"></div>
            <div class="feedback" id="vocab-feedback"></div>
            <div class="explanation" id="vocab-explanation"></div>
            <div class="options" id="vocab-options"></div>
            <div class="button-group">
                <button class="btn btn-primary" id="vocab-submit" onclick="submitVocabAnswer()">
                    回答する
                </button>
                <button class="btn btn-secondary" onclick="nextVocabQuestion()">
                    次へ
                </button>
            </div>
        </div>

        <!-- 文法・語彙問題 -->
        <div id="grammar" class="quiz-container">
            <div class="mode-info">
                💡 文中の空所に適切な単語を選択してください。4択から正しい答えを選びましょう。
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="grammar-progress">0%</div>
            </div>
            <div class="question-number" id="grammar-question-num">問題 1/10</div>
            <div class="question-text" id="grammar-question"></div>
            <div class="feedback" id="grammar-feedback"></div>
            <div class="explanation" id="grammar-explanation"></div>
            <div class="options" id="grammar-options"></div>
            <div class="button-group">
                <button class="btn btn-primary" id="grammar-submit" onclick="submitGrammarAnswer()">
                    回答する
                </button>
                <button class="btn btn-secondary" onclick="nextGrammarQuestion()">
                    次へ
                </button>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="results" class="results">
            <div class="emoji" id="results-emoji"></div>
            <div class="results-message" id="results-message"></div>
            <div class="results-score" id="results-score"></div>
            <div class="results-details" id="results-details"></div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="restartQuiz()">
                    もう一度チャレンジ
                </button>
                <button class="btn btn-secondary" onclick="backToMode()">
                    モード選択に戻る
                </button>
            </div>
        </div>
    </div>

    <script>
        // 単語問題データ
        const vocabularyQuestions = [
            { word: "branch", definition: "支店", choices: ["支店", "本社", "部署", "工場"], answer: "支店" },
            { word: "clothing", definition: "衣類", choices: ["衣類", "家具", "食品", "電化製品"], answer: "衣類" },
            { word: "honor", definition: "光栄、名誉", choices: ["光栄、名誉", "義務", "責任", "報酬"], answer: "光栄、名誉" },
            { word: "strike", definition: "ストライキ、打撃", choices: ["ストライキ、打撃", "交渉", "契約", "会議"], answer: "ストライキ、打撃" },
            { word: "train", definition: "～を訓練する、列車", choices: ["～を訓練する、列車", "～を教える、学校", "～を学ぶ、教科書", "～を運転する、車"], answer: "～を訓練する、列車" },
            { word: "ceiling", definition: "天井、上限", choices: ["天井、上限", "床、下限", "壁、側面", "窓、開口部"], answer: "天井、上限" },
            { word: "due", definition: "支払期限に達している、予定の", choices: ["支払期限に達している、予定の", "無料の、自由な", "遅れている、延期された", "完了した、終了した"], answer: "支払期限に達している、予定の" },
            { word: "identity", definition: "身元", choices: ["身元", "個性", "特徴", "性格"], answer: "身元" },
            { word: "origin", definition: "原産地、起源", choices: ["原産地、起源", "目的地、終点", "中間点、通過点", "分岐点、交差点"], answer: "原産地、起源" },
            { word: "zone", definition: "区域、地帯", choices: ["区域、地帯", "建物、構造物", "道路、通路", "境界、限界"], answer: "区域、地帯" },
            { word: "author", definition: "著者、作家", choices: ["著者、作家", "読者、聴衆", "編集者、校正者", "出版者、発行者"], answer: "著者、作家" },
            { word: "expense", definition: "費用、経費", choices: ["費用、経費", "収入、収益", "利益、儲け", "貯蓄、蓄え"], answer: "費用、経費" },
            { word: "iron", definition: "～にアイロンをかける、アイロン、鉄", choices: ["～にアイロンをかける、アイロン、鉄", "～を洗う、洗濯機、水", "～を縫う、ミシン、布", "～を磨く、ブラシ、靴"], answer: "～にアイロンをかける、アイロン、鉄" },
            { word: "opposite", definition: "反対側の、反対の", choices: ["反対側の、反対の", "同じ側の、同様の", "隣接する、近くの", "平行な、並行の"], answer: "反対側の、反対の" },
            { word: "twice", definition: "2回、2倍", choices: ["2回、2倍", "1回、1倍", "3回、3倍", "半分、半分"], answer: "2回、2倍" },
            { word: "attention", definition: "注意、注目", choices: ["注意、注目", "無視、軽視", "怠慢、不注意", "集中、専念"], answer: "注意、注目" },
            { word: "conference", definition: "会議", choices: ["会議", "パーティー", "旅行", "休憩"], answer: "会議" },
            { word: "exact", definition: "正確な、ちょうどの", choices: ["正確な、ちょうどの", "おおよその、不正確な", "曖昧な、不明瞭な", "一般的な、普通の"], answer: "正確な、ちょうどの" },
            { word: "performance", definition: "パフォーマンス、業績、性能", choices: ["パフォーマンス、業績、性能", "失敗、不振", "準備、計画", "評価、査定"], answer: "パフォーマンス、業績、性能" },
            { word: "smoothly", definition: "滑らかに、スムーズに", choices: ["滑らかに、スムーズに", "ぎこちなく、不器用に", "困難に、苦労して", "突然に、不意に"], answer: "滑らかに、スムーズに" },
            { word: "awake", definition: "起きている", choices: ["起きている", "眠っている", "疲れている", "夢を見ている"], answer: "起きている" },
            { word: "discount", definition: "割引、値引き", choices: ["割引、値引き", "追加料金、割増金", "定価、正規料金", "税金、関税"], answer: "割引、値引き" },
            { word: "favorite", definition: "お気に入りの", choices: ["お気に入りの", "嫌いな", "普通の", "珍しい"], answer: "お気に入りの" },
            { word: "plastic", definition: "プラスチック製の", choices: ["プラスチック製の", "金属製の", "木製の", "ガラス製の"], answer: "プラスチック製の" },
            { word: "software", definition: "ソフトウェア", choices: ["ソフトウェア", "ハードウェア", "ネットワーク", "データ"], answer: "ソフトウェア" },
            { word: "baggage", definition: "手荷物、荷物", choices: ["手荷物、荷物", "乗客、旅行者", "航空券、切符", "目的地、行き先"], answer: "手荷物、荷物" },
            { word: "enclose", definition: "～を同封する", choices: ["～を同封する", "～を発送する", "～を受け取る", "～を開封する"], answer: "～を同封する" },
            { word: "journalism", definition: "ジャーナリズム", choices: ["ジャーナリズム", "文学", "科学", "芸術"], answer: "ジャーナリズム" },
            { word: "rare", definition: "まれな、珍しい", choices: ["まれな、珍しい", "一般的な、普通の", "頻繁な、よくある", "ありふれた、平凡な"], answer: "まれな、珍しい" },
            { word: "visa", definition: "ビザ、査証", choices: ["ビザ、査証", "パスポート、旅券", "航空券、切符", "身分証明書、ID"], answer: "ビザ、査証" },
            { word: "add", definition: "～を加える、追加する", choices: ["～を加える、追加する", "～を減らす、削除する", "～を掛ける、乗算する", "～を割る、除算する"], answer: "～を加える、追加する" },
            { word: "bush", definition: "茂み", choices: ["茂み", "木、森林", "花、植物", "草、芝生"], answer: "茂み" },
            { word: "house", definition: "～を収容する、家、住宅", choices: ["～を収容する、家、住宅", "～を建設する、建物、構造物", "～を破壊する、廃墟、瓦礫", "～を販売する、店舗、商業施設"], answer: "～を収容する、家、住宅" },
            { word: "meal", definition: "食事", choices: ["食事", "飲み物", "おやつ", "デザート"], answer: "食事" },
            { word: "subject", definition: "主題、件名", choices: ["主題、件名", "目的、目標", "結果、成果", "方法、手段"], answer: "主題、件名" },
            { word: "anywhere", definition: "どこにも、どこでも", choices: ["どこにも、どこでも", "どこにもない", "特定の場所", "ここ"], answer: "どこにも、どこでも" },
            { word: "chair", definition: "～の議長を務める、議長、椅子", choices: ["～の議長を務める、議長、椅子", "～を座る、座席、ベンチ", "～を運ぶ、テーブル、机", "～を修理する、道具、工具"], answer: "～の議長を務める、議長、椅子" },
            { word: "hurt", definition: "～を傷つける、損なう", choices: ["～を傷つける、損なう", "～を癒す、治療する", "～を助ける、支援する", "～を保護する、守る"], answer: "～を傷つける、損なう" },
            { word: "port", definition: "港、ポート", choices: ["港、ポート", "空港、飛行場", "駅、鉄道", "バス停、停留所"], answer: "港、ポート" },
            { word: "volume", definition: "量、音量", choices: ["量、音量", "速度、速さ", "温度、熱", "重さ、質量"], answer: "量、音量" },
            { word: "bottom", definition: "底、下部", choices: ["底、下部", "上部、頂上", "側面、横", "中央、中心"], answer: "底、下部" },
            { word: "entrance", definition: "入り口、入場", choices: ["入り口、入場", "出口、退場", "通路、廊下", "壁、境界"], answer: "入り口、入場" },
            { word: "length", definition: "長さ、期間", choices: ["長さ、期間", "幅、広さ", "高さ、深さ", "面積、体積"], answer: "長さ、期間" },
            { word: "quickly", definition: "すばやく", choices: ["すばやく", "ゆっくりと", "慎重に", "丁寧に"], answer: "すばやく" },
            { word: "accommodate", definition: "収容する、宿泊させる", choices: ["収容する、宿泊させる", "拒否する、断る", "追い出す、排除する", "無視する、見過ごす"], answer: "収容する、宿泊させる" },
            { word: "committee", definition: "委員会", choices: ["委員会", "個人", "部門", "会社"], answer: "委員会" },
            { word: "instruction", definition: "説明書、指示", choices: ["説明書、指示", "質問、疑問", "提案、助言", "苦情、不満"], answer: "説明書、指示" },
            { word: "invoice", definition: "請求書", choices: ["請求書", "領収書", "見積書", "注文書"], answer: "請求書" },
            { word: "patron", definition: "後援者、常連客", choices: ["後援者、常連客", "従業員、スタッフ", "競争相手、ライバル", "見物人、観客"], answer: "後援者、常連客" },
            { word: "representative", definition: "代表者、担当者", choices: ["代表者、担当者", "顧客、クライアント", "上司、管理者", "部下、同僚"], answer: "代表者、担当者" },
            { word: "shortage", definition: "不足", choices: ["不足", "過剰", "豊富", "十分"], answer: "不足" },
            { word: "voucher", definition: "引換券、クーポン", choices: ["引換券、クーポン", "現金、紙幣", "小切手、手形", "クレジットカード"], answer: "引換券、クーポン" },
            { word: "otherwise", definition: "さもなければ、その他の点では", choices: ["さもなければ、その他の点では", "したがって、その結果", "同様に、同様に", "しかしながら、それでも"], answer: "さもなければ、その他の点では" },
            { word: "nutrition", definition: "栄養", choices: ["栄養", "運動", "休息", "健康"], answer: "栄養" },
            { word: "identification", definition: "身分証明、識別", choices: ["身分証明、識別", "匿名、無名", "偽造、模倣", "誤認、誤解"], answer: "身分証明、識別" },
            { word: "cuisine", definition: "料理", choices: ["料理", "飲み物", "デザート", "食材"], answer: "料理" },
            { word: "insurance", definition: "保険", choices: ["保険", "貯蓄", "投資", "年金"], answer: "保険" },
            { word: "contract", definition: "契約", choices: ["契約", "合意", "交渉", "提案"], answer: "契約" },
            { word: "assurance", definition: "保証、確信", choices: ["保証、確信", "不安、疑念", "不信、不確実", "危険、リスク"], answer: "保証、確信" }
        ];

        // 文法・語彙問題データ
        const grammarQuestions = [
            { sentence: "The company decided to ____ its new product line at the upcoming trade show.", choices: ["launch", "launching", "launched", "launches"], answer: "launch", explanation: "助動詞 'decided to' の後には動詞の原形が来ます。" },
            { sentence: "All employees are required to ____ their time sheets by Friday.", choices: ["submit", "submitting", "submitted", "submission"], answer: "submit", explanation: "'required to' の後には動詞の原形が来ます。" },
            { sentence: "The new policy will be ____ next month.", choices: ["effective", "effectively", "effect", "effected"], answer: "effective", explanation: "'be動詞' の後には形容詞が来ます。" },
            { sentence: "Please review the attached document ____.", choices: ["carefully", "careful", "carefulness", "caring"], answer: "carefully", explanation: "動詞 'review' を修飾するのは副詞です。" },
            { sentence: "The seminar will cover a ____ of topics related to marketing.", choices: ["variety", "various", "varied", "vary"], answer: "variety", explanation: "'a ____ of' の形では名詞が適切です。" },
            { sentence: "The manager was impressed by her ____ to detail.", choices: ["attention", "attentive", "attentively", "attend"], answer: "attention", explanation: "'her ____ to detail' の形では名詞が適切です。" },
            { sentence: "The new software is designed to ____ productivity.", choices: ["enhance", "enhancement", "enhancing", "enhanced"], answer: "enhance", explanation: "'to' の後には動詞の原形が来ます。" },
            { sentence: "We are looking for a candidate with ____ experience in project management.", choices: ["extensive", "extensively", "extension", "extend"], answer: "extensive", explanation: "名詞 'experience' を修飾するのは形容詞です。" },
            { sentence: "The report needs to be submitted ____ the end of the day.", choices: ["by", "until", "for", "since"], answer: "by", explanation: "期限を表す前置詞は 'by' です。" },
            { sentence: "The company offers a ____ range of services to its clients.", choices: ["broad", "broadly", "broaden", "breadth"], answer: "broad", explanation: "名詞 'range' を修飾するのは形容詞です。" },
            { sentence: "The new system will allow us to process orders more ____.", choices: ["efficiently", "efficient", "efficiency", "efficacious"], answer: "efficiently", explanation: "動詞 'process' を修飾するのは副詞です。" },
            { sentence: "Please make sure all documents are ____ before the meeting.", choices: ["prepared", "prepare", "preparing", "preparation"], answer: "prepared", explanation: "'are' の後には過去分詞が来て受動態を形成します。" },
            { sentence: "The company is committed to providing ____ customer service.", choices: ["excellent", "excellently", "excellence", "excel"], answer: "excellent", explanation: "名詞 'customer service' を修飾するのは形容詞です。" },
            { sentence: "The project was completed ____ schedule.", choices: ["ahead of", "behind", "on", "with"], answer: "ahead of", explanation: "'ahead of schedule' で予定より早くという意味になります。" },
            { sentence: "We need to ____ our budget for the next quarter.", choices: ["review", "reviewing", "reviewed", "reviews"], answer: "review", explanation: "'need to' の後には動詞の原形が来ます。" },
            { sentence: "The new regulations will have a significant ____ on the industry.", choices: ["impact", "impactful", "impactfully", "impacting"], answer: "impact", explanation: "'a significant ____' の形では名詞が適切です。" },
            { sentence: "The conference will be held ____ the city center.", choices: ["in", "on", "at", "to"], answer: "in", explanation: "場所を表す前置詞は 'in' が適切です。" },
            { sentence: "The company is seeking a highly ____ individual.", choices: ["motivated", "motivate", "motivation", "motivating"], answer: "motivated", explanation: "'highly' の後には形容詞が来ます。ここでは過去分詞が形容詞として機能しています。" },
            { sentence: "Please indicate your ____ by signing below.", choices: ["agreement", "agree", "agreeable", "agreeably"], answer: "agreement", explanation: "'your ____' の形では名詞が適切です。" },
            { sentence: "The deadline for applications is ____ Friday.", choices: ["this", "next", "last", "every"], answer: "this", explanation: "直近の金曜日を指す場合は 'this' が適切です。" },
            { sentence: "The company is expanding its operations ____.", choices: ["globally", "global", "globe", "globalization"], answer: "globally", explanation: "動詞 'expanding' を修飾するのは副詞です。" },
            { sentence: "We appreciate your ____ in this matter.", choices: ["cooperation", "cooperate", "cooperative", "cooperatively"], answer: "cooperation", explanation: "'your ____' の形では名詞が適切です。" },
            { sentence: "The new product has received ____ reviews from customers.", choices: ["positive", "positively", "positivity", "positiveness"], answer: "positive", explanation: "名詞 'reviews' を修飾するのは形容詞です。" },
            { sentence: "The presentation will begin ____ 10:00 AM.", choices: ["at", "on", "in", "by"], answer: "at", explanation: "特定の時間を表す前置詞は 'at' です。" },
            { sentence: "The company is looking for ways to ____ costs.", choices: ["reduce", "reduction", "reducing", "reduced"], answer: "reduce", explanation: "'to' の後には動詞の原形が来ます。" },
            { sentence: "The new marketing campaign was highly ____.", choices: ["successful", "successfully", "success", "succeed"], answer: "successful", explanation: "'highly' の後には形容詞が来ます。" },
            { sentence: "Please refer to the ____ manual for more information.", choices: ["user", "use", "useful", "usage"], answer: "user", explanation: "'user manual' で取扱説明書という意味になります。" },
            { sentence: "The company aims to ____ customer satisfaction.", choices: ["improve", "improvement", "improving", "improved"], answer: "improve", explanation: "'aims to' の後には動詞の原形が来ます。" },
            { sentence: "The project requires a significant ____ of resources.", choices: ["allocation", "allocate", "allocating", "allocated"], answer: "allocation", explanation: "'a significant ____ of' の形では名詞が適切です。" },
            { sentence: "The new regulations are designed to ____ public safety.", choices: ["ensure", "ensuring", "ensured", "ensurance"], answer: "ensure", explanation: "'to' の後には動詞の原形が来ます。" },
            { sentence: "The company is seeking to ____ its market share.", choices: ["increase", "increasing", "increased", "increaseable"], answer: "increase", explanation: "'seeking to' の後には動詞の原形が来ます。" },
            { sentence: "The new policy will be ____ to all employees.", choices: ["applicable", "apply", "application", "applied"], answer: "applicable", explanation: "'be動詞' の後には形容詞が来ます。" },
            { sentence: "We need to develop a more ____ strategy.", choices: ["effective", "effectively", "effect", "effected"], answer: "effective", explanation: "名詞 'strategy' を修飾するのは形容詞です。" },
            { sentence: "The company has a strong ____ for innovation.", choices: ["reputation", "repute", "reputable", "reputably"], answer: "reputation", explanation: "'a strong ____ for' の形では名詞が適切です。" },
            { sentence: "The new system is expected to ____ operational efficiency.", choices: ["improve", "improvement", "improving", "improved"], answer: "improve", explanation: "'expected to' の後には動詞の原形が来ます。" },
            { sentence: "Please confirm your ____ by replying to this email.", choices: ["attendance", "attend", "attending", "attendant"], answer: "attendance", explanation: "'your ____' の形では名詞が適切です。" },
            { sentence: "The company is committed to ____ high-quality products.", choices: ["delivering", "deliver", "delivered", "delivery"], answer: "delivering", explanation: "'committed to' の後には動名詞が来ます。" },
            { sentence: "The new policy will be ____ in January.", choices: ["implemented", "implement", "implementing", "implementation"], answer: "implemented", explanation: "'be動詞' の後には過去分詞が来て受動態を形成します。" },
            { sentence: "We need to ____ the terms of the contract.", choices: ["negotiate", "negotiation", "negotiating", "negotiated"], answer: "negotiate", explanation: "'need to' の後には動詞の原形が来ます。" },
            { sentence: "The company is seeking to ____ its customer base.", choices: ["expand", "expansion", "expanding", "expanded"], answer: "expand", explanation: "'seeking to' の後には動詞の原形が来ます。" },
            { sentence: "The new system will provide ____ access to information.", choices: ["instant", "instantly", "instance", "instantiate"], answer: "instant", explanation: "名詞 'access' を修飾するのは形容詞です。" },
            { sentence: "Please ensure that all safety ____ are followed.", choices: ["procedures", "proceed", "proceeding", "procedural"], answer: "procedures", explanation: "'safety ____' の形では名詞が適切です。" },
            { sentence: "The company is looking for a highly ____ candidate.", choices: ["qualified", "qualify", "qualifying", "qualification"], answer: "qualified", explanation: "'highly' の後には形容詞が来ます。ここでは過去分詞が形容詞として機能しています。" },
            { sentence: "The new product is expected to be a major ____.", choices: ["success", "successful", "successfully", "succeed"], answer: "success", explanation: "'a major ____' の形では名詞が適切です。" },
            { sentence: "We need to ____ our efforts to achieve our goals.", choices: ["coordinate", "coordination", "coordinating", "coordinated"], answer: "coordinate", explanation: "'need to' の後には動詞の原形が来ます。" },
            { sentence: "The company offers a ____ range of benefits.", choices: ["comprehensive", "comprehensively", "comprehend", "comprehension"], answer: "comprehensive", explanation: "名詞 'range' を修飾するのは形容詞です。" },
            { sentence: "The new system will ____ us to work more efficiently.", choices: ["enable", "enabling", "enabled", "enablement"], answer: "enable", explanation: "'will' の後には動詞の原形が来ます。" },
            { sentence: "Please submit your application ____ the deadline.", choices: ["before", "after", "during", "until"], answer: "before", explanation: "期限より前を表す前置詞は 'before' です。" },
            { sentence: "The company is committed to ____ a safe working environment.", choices: ["maintaining", "maintain", "maintained", "maintenance"], answer: "maintaining", explanation: "'committed to' の後には動名詞が来ます。" },
            { sentence: "The new product has received ____ feedback.", choices: ["favorable", "favorably", "favor", "favored"], answer: "favorable", explanation: "名詞 'feedback' を修飾するのは形容詞です。" }
        ];

        let currentMode = 'vocabulary';
        let currentQuestionIndex = 0;
        let vocabQuestions = [];
        let grammarQuestions = [];
        let vocabScore = 0;
        let grammarScore = 0;
        let vocabAnswered = false;
        let grammarAnswered = false;
        let vocabSelectedAnswer = null;
        let grammarSelectedAnswer = null;

        // モード選択
        function selectMode(mode) {
            currentMode = mode;
            currentQuestionIndex = 0;
            vocabScore = 0;
            grammarScore = 0;

            // ランダムに10問選択
            vocabQuestions = getRandomQuestions(vocabularyQuestions, 10);
            grammarQuestions = getRandomQuestions(grammarQuestions, 10);

            // UIの更新
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.quiz-container').forEach(container => container.classList.remove('active'));
            document.getElementById(mode).classList.add('active');
            document.getElementById('results').classList.remove('show');

            if (mode === 'vocabulary') {
                displayVocabQuestion();
            } else {
                displayGrammarQuestion();
            }
        }

        // ランダムに質問を選択
        function getRandomQuestions(questions, count) {
            const shuffled = [...questions].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        // 単語問題を表示
        function displayVocabQuestion() {
            const question = vocabQuestions[currentQuestionIndex];
            vocabAnswered = false;
            vocabSelectedAnswer = null;

            document.getElementById('vocab-question-num').textContent = `問題 ${currentQuestionIndex + 1}/10`;
            document.getElementById('vocab-question').textContent = `「${question.word}」の意味は？`;
            document.getElementById('vocab-feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('vocab-explanation').classList.remove('show');

            const optionsContainer = document.getElementById('vocab-options');
            optionsContainer.innerHTML = '';

            question.choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = choice;
                button.onclick = () => selectVocabOption(index, choice);
                optionsContainer.appendChild(button);
            });

            updateVocabProgress();
            document.getElementById('vocab-submit').disabled = false;
            document.getElementById('vocab-submit').textContent = '回答する';
        }

        // 単語問題のオプション選択
        function selectVocabOption(index, choice) {
            if (vocabAnswered) return;

            vocabSelectedAnswer = choice;
            document.querySelectorAll('#vocab-options .option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
        }

        // 単語問題を提出
        function submitVocabAnswer() {
            if (!vocabSelectedAnswer) {
                alert('選択肢を選んでください');
                return;
            }

            vocabAnswered = true;
            const question = vocabQuestions[currentQuestionIndex];
            const isCorrect = vocabSelectedAnswer === question.answer;

            if (isCorrect) {
                vocabScore++;
                document.getElementById('vocab-feedback').textContent = '✅ 正解です！';
                document.getElementById('vocab-feedback').classList.add('show', 'correct');
            } else {
                document.getElementById('vocab-feedback').textContent = `❌ 不正解です。正解は「${question.answer}」です。`;
                document.getElementById('vocab-feedback').classList.add('show', 'incorrect');
            }

            // 正解・不正解を表示
            document.querySelectorAll('#vocab-options .option').forEach(opt => {
                if (opt.textContent === question.answer) {
                    opt.classList.add('correct');
                } else if (opt.classList.contains('selected') && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });

            document.getElementById('vocab-submit').disabled = true;
            document.getElementById('vocab-submit').textContent = '次へ';
        }

        // 次の単語問題へ
        function nextVocabQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < 10) {
                displayVocabQuestion();
            } else {
                showResults('vocabulary');
            }
        }

        // 文法問題を表示
        function displayGrammarQuestion() {
            const question = grammarQuestions[currentQuestionIndex];
            grammarAnswered = false;
            grammarSelectedAnswer = null;

            document.getElementById('grammar-question-num').textContent = `問題 ${currentQuestionIndex + 1}/10`;
            document.getElementById('grammar-question').textContent = question.sentence;
            document.getElementById('grammar-feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('grammar-explanation').classList.remove('show');

            const optionsContainer = document.getElementById('grammar-options');
            optionsContainer.innerHTML = '';

            question.choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = choice;
                button.onclick = () => selectGrammarOption(index, choice);
                optionsContainer.appendChild(button);
            });

            updateGrammarProgress();
            document.getElementById('grammar-submit').disabled = false;
            document.getElementById('grammar-submit').textContent = '回答する';
        }

        // 文法問題のオプション選択
        function selectGrammarOption(index, choice) {
            if (grammarAnswered) return;

            grammarSelectedAnswer = choice;
            document.querySelectorAll('#grammar-options .option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
        }

        // 文法問題を提出
        function submitGrammarAnswer() {
            if (!grammarSelectedAnswer) {
                alert('選択肢を選んでください');
                return;
            }

            grammarAnswered = true;
            const question = grammarQuestions[currentQuestionIndex];
            const isCorrect = grammarSelectedAnswer === question.answer;

            if (isCorrect) {
                grammarScore++;
                document.getElementById('grammar-feedback').textContent = '✅ 正解です！';
                document.getElementById('grammar-feedback').classList.add('show', 'correct');
            } else {
                document.getElementById('grammar-feedback').textContent = `❌ 不正解です。正解は「${question.answer}」です。`;
                document.getElementById('grammar-feedback').classList.add('show', 'incorrect');
            }

            document.getElementById('grammar-explanation').textContent = `💡 ${question.explanation}`;
            document.getElementById('grammar-explanation').classList.add('show');

            // 正解・不正解を表示
            document.querySelectorAll('#grammar-options .option').forEach(opt => {
                if (opt.textContent === question.answer) {
                    opt.classList.add('correct');
                } else if (opt.classList.contains('selected') && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });

            document.getElementById('grammar-submit').disabled = true;
            document.getElementById('grammar-submit').textContent = '次へ';
        }

        // 次の文法問題へ
        function nextGrammarQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < 10) {
                displayGrammarQuestion();
            } else {
                showResults('grammar');
            }
        }

        // 進捗バーを更新
        function updateVocabProgress() {
            const progress = ((currentQuestionIndex) / 10) * 100;
            document.getElementById('vocab-progress').style.width = progress + '%';
            document.getElementById('vocab-progress').textContent = Math.round(progress) + '%';
        }

        function updateGrammarProgress() {
            const progress = ((currentQuestionIndex) / 10) * 100;
            document.getElementById('grammar-progress').style.width = progress + '%';
            document.getElementById('grammar-progress').textContent = Math.round(progress) + '%';
        }

        // 結果を表示
        function showResults(mode) {
            const score = mode === 'vocabulary' ? vocabScore : grammarScore;
            const percentage = (score / 10) * 100;

            let emoji = '😢';
            let message = 'もう少しです。頑張りましょう！';

            if (percentage >= 90) {
                emoji = '🎉';
                message = '素晴らしい！完璧です！';
            } else if (percentage >= 70) {
                emoji = '😊';
                message = 'よくできました！';
            } else if (percentage >= 50) {
                emoji = '🙂';
                message = 'まあまあです。もう一度チャレンジしましょう！';
            }

            document.getElementById('results-emoji').textContent = emoji;
            document.getElementById('results-message').textContent = message;
            document.getElementById('results-score').textContent = `${score}/10 (${percentage}%)`;
            document.getElementById('results-details').innerHTML = `
                <p>正解数: ${score}問</p>
                <p>得点率: ${percentage}%</p>
            `;

            document.querySelectorAll('.quiz-container').forEach(container => container.classList.remove('active'));
            document.getElementById('results').classList.add('show');
        }

        // クイズを再開
        function restartQuiz() {
            selectMode(currentMode);
        }

        // モード選択に戻る
        function backToMode() {
            document.querySelectorAll('.quiz-container').forEach(container => container.classList.remove('active'));
            document.getElementById('results').classList.remove('show');
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        }

        // 初期化
        window.addEventListener('load', () => {
            vocabQuestions = getRandomQuestions(vocabularyQuestions, 10);
            grammarQuestions = getRandomQuestions(grammarQuestions, 10);
            displayVocabQuestion();
        });
    </script>
</body>
</html>
